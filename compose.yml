services:
  arr-agent:
    #    image: docker.io/knucklessg1/arr-mcp:latest
    build:
      context: .
      dockerfile: debug.Dockerfile
    container_name: arr-agent
    hostname: arr-agent
    command: [ "arr-agent" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - "${IP_DNS:-1.1.1.1}"
    depends_on:
      arr-mcp:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    env_file:
      - .env
    environment:
      - "PYTHONUNBUFFERED=1"
      - "HOST=0.0.0.0"
      - "PORT=9099"
      - "TRANSPORT=streamable-http"
      - "CHAPTARR_BASE_URL=${CHAPTARR_BASE_URL:-http://chaptarr.arpa}"
      - "CHAPTARR_API_KEY=${CHAPTARR_API_KEY}"
      - "CHAPTARR_SSL_VERIFY=${CHAPTARR_SSL_VERIFY:-True}"
      - "LIDARR_BASE_URL=${LIDARR_BASE_URL:-http://lidarr.arpa}"
      - "LIDARR_API_KEY=${LIDARR_API_KEY}"
      - "LIDARR_SSL_VERIFY=${LIDARR_SSL_VERIFY:-True}"
      - "PROWLARR_BASE_URL=${PROWLARR_BASE_URL:-http://prowlarr.arpa}"
      - "PROWLARR_API_KEY=${PROWLARR_API_KEY}"
      - "PROWLARR_SSL_VERIFY=${PROWLARR_SSL_VERIFY:-True}"
      - "RADARR_BASE_URL=${RADARR_BASE_URL:-http://radarr.arpa}"
      - "RADARR_API_KEY=${RADARR_API_KEY}"
      - "RADARR_SSL_VERIFY=${RADARR_SSL_VERIFY:-True}"
      - "SONARR_BASE_URL=${SONARR_BASE_URL:-http://sonarr.arpa}"
      - "SONARR_API_KEY=${SONARR_API_KEY}"
      - "SONARR_SSL_VERIFY=${SONARR_SSL_VERIFY:-True}"
      - "BAZARR_BASE_URL=${BAZARR_BASE_URL:-http://bazarr.arpa}"
      - "BAZARR_API_KEY=${BAZARR_API_KEY}"
      - "BAZARR_SSL_VERIFY=${BAZARR_SSL_VERIFY:-True}"
      - "SEERR_BASE_URL=${SEERR_BASE_URL:-http://seerr.arpa}"
      - "SEERR_API_KEY=${SEERR_API_KEY}"
      - "SEERR_SSL_VERIFY=${SEERR_SSL_VERIFY:-True}"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=${MODEL_ID:-google/gemma-4-31b}"
      - "DEBUG=False"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
    ports:
      - "9099:9099"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9099/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
